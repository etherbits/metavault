services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile.prod
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/packages/server/data
    environment:
      DATABASE_URL: sqlite:///app/packages/server/data/db.sqlite
      NODE_ENV: production
    expose:
      - "8080"
  web-client:
    build:
      context: .
      dockerfile: packages/web-client/Dockerfile.prod
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - server
volumes:
  sqlite_data:
