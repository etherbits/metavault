services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile.prod
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/packages/server/data
    environment:
      DATABASE_URL: sqlite:///app/packages/server/data/db.sqlite
      NODE_ENV: production
      PORT: "3435"
      CLIENT_ORIGIN: "${CLIENT_ORIGIN:-http://localhost:3534}"
    ports:
      - "3435:3435"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3435/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  web-client:
    build:
      context: .
      dockerfile: packages/web-client/Dockerfile.prod
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3435/}"
    restart: unless-stopped
    ports:
      - "3534:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  sqlite_data:
