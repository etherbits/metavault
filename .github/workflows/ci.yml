name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
      - run: bun install --frozen-lockfile
      - run: bunx @biomejs/biome lint .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
      - run: bun install --frozen-lockfile
      - run: bun test tests/unit-tests

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
      - run: bun install --frozen-lockfile
      - run: bunx playwright install chromium --with-deps
      - run: bun run test:e2e
        env:
          CI: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/web-client

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
        working-directory: packages/server
      - run: bunx tsc --noEmit
        working-directory: packages/web-client

  ezq:
    name: EZQ quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/ezq
      - run: cargo fmt --check
        working-directory: packages/ezq
      - run: cargo test
        working-directory: packages/ezq

  publish-ezq:
    name: Publish EZQ WASM packages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ezq]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/ezq
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install npm 11
        run: |
          curl -sL https://registry.npmjs.org/npm/-/npm-11.5.1.tgz | tar -xz -C /tmp/
          node /tmp/package/bin/npm-cli.js install -g /tmp/package/
      - run: bash scripts/build-ezq.sh
      - name: Publish @etherbits/ezq-node
        working-directory: packages/ezq/out/node
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@etherbits/ezq-node@$VERSION" version 2>/dev/null; then
            echo "@etherbits/ezq-node@$VERSION already published, skipping"
          else
            npm publish --access public --provenance
          fi
      - name: Publish @etherbits/ezq-web
        working-directory: packages/ezq/out/web
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@etherbits/ezq-web@$VERSION" version 2>/dev/null; then
            echo "@etherbits/ezq-web@$VERSION already published, skipping"
          else
            npm publish --access public --provenance
          fi

  publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, unit-tests, e2e, build, type-check, ezq, publish-ezq]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Wait for ezq packages to propagate on npm
        run: |
          VERSION=$(grep '^version' packages/ezq/Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          for pkg in "@etherbits/ezq-node@$VERSION" "@etherbits/ezq-web@$VERSION"; do
            echo "Waiting for $pkg..."
            for i in $(seq 1 30); do
              npm view "$pkg" version 2>/dev/null && echo "$pkg is available" && break
              echo "Attempt $i/30: not yet available, retrying in 10s..."
              [ $i -eq 30 ] && echo "ERROR: $pkg never became available" && exit 1
              sleep 10
            done
          done
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/server:latest
          secrets: |
            npm_token=${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web-client/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          build-args: |
            VITE_API_URL=http://localhost:3435/
          push: true
          tags: ghcr.io/${{ github.repository }}/web-client:latest
          secrets: |
            npm_token=${{ secrets.GITHUB_TOKEN }}
