services:
  server:
    image: ghcr.io/etherbits/metavault/server:latest
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/packages/server/data
    environment:
      DATABASE_URL: sqlite:///app/packages/server/data/db.sqlite
      NODE_ENV: production
      PORT: "3435"
      CLIENT_ORIGIN: "${CLIENT_ORIGIN:-http://localhost:3534}"
    ports:
      - "3435:3435"

  web-client:
    image: ghcr.io/etherbits/metavault/web-client:latest
    restart: unless-stopped
    ports:
      - "3534:80"
    depends_on:
      - server

volumes:
  sqlite_data:
